<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tweet Screenshot — @RMadrid_actu</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --gold: #C9A84C; --gold-l: #F0D080;
    --dark: #0A0A0A; --d2: #111; --d3: #1A1A1A; --d4: #252525;
    --white: #F5F5F0; --grey: #888; --green: #22C55E; --red: #EF4444;
    --tw-bg: #15202b; --tw-border: #2f3336; --tw-text: #e7e9ea;
    --tw-muted: #71767b; --tw-blue: #1d9bf0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:var(--white); font-family:'DM Sans',sans-serif; min-height:100vh; }

  .hdr { border-bottom:1px solid #222; padding:16px 32px; display:flex; align-items:center; gap:14px; background:var(--d2); }
  .logo { width:36px;height:36px; background:var(--gold); border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--dark); flex-shrink:0; }
  .hdr-t { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; }
  .hdr-s { font-size:11px; color:var(--grey); margin-top:1px; }

  .main { max-width:920px; margin:0 auto; padding:28px 22px; }

  .info { background:#0d0d00; border:1px solid #2a2500; border-left:3px solid var(--gold); border-radius:8px; padding:11px 16px; font-size:12px; color:#999; line-height:1.8; margin-bottom:22px; }
  .info strong { color:var(--gold-l); }

  .paste-box { background:var(--d2); border:1.5px dashed #2e2e2e; border-radius:12px; padding:18px; margin-bottom:16px; transition:border-color .2s; }
  .paste-box:focus-within { border-color:var(--gold); }
  .lbl { font-size:11px; color:var(--grey); font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
  textarea { width:100%; background:var(--d3); border:1px solid #2a2a2a; border-radius:8px; padding:11px 14px; color:var(--white); font-family:'DM Sans',sans-serif; font-size:14px; resize:vertical; min-height:96px; outline:none; line-height:1.6; transition:border-color .2s; }
  textarea:focus { border-color:var(--gold); }
  textarea::placeholder { color:#3a3a3a; }
  .hint { font-size:11px; color:#555; margin-top:6px; }

  .row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:28px; }
  .bp { background:var(--gold); color:var(--dark); border:none; border-radius:8px; padding:11px 22px; font-family:'DM Sans',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:all .15s; display:inline-flex; align-items:center; gap:7px; }
  .bp:hover { background:var(--gold-l); transform:translateY(-1px); }
  .bp:disabled { opacity:.4; cursor:not-allowed; transform:none; }
  .bs { background:var(--d4); color:var(--white); border:1px solid #333; border-radius:8px; padding:9px 16px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all .15s; display:inline-flex; align-items:center; gap:6px; }
  .bs:hover { border-color:var(--gold); color:var(--gold); }
  .bs:disabled { opacity:.4; cursor:not-allowed; }

  .sec-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .sec-t { font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:1px; color:var(--gold); }
  .bdg { background:var(--d3); padding:3px 11px; border-radius:20px; font-size:12px; color:var(--grey); }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px; }

  .card { background:var(--d2); border:1px solid #1e1e1e; border-radius:13px; overflow:hidden; transition:border-color .2s,box-shadow .2s; }
  .card:hover { border-color:#2e2e2e; box-shadow:0 4px 22px rgba(0,0,0,.45); }
  .card-top { padding:11px 14px 3px; display:flex; align-items:center; }
  .pill { display:flex; align-items:center; gap:5px; font-size:11px; font-weight:500; }
  .dot { width:7px;height:7px; border-radius:50%; flex-shrink:0; }
  .d-load { background:var(--gold); animation:pulse 1s infinite; }
  .d-ok { background:var(--green); }
  .d-err { background:var(--red); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.25} }
  .card-url { padding:0 14px 7px; font-size:10px; color:#383838; font-family:monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-body { padding:6px 10px 8px; }
  .card-actions { padding:8px 14px 12px; border-top:1px solid #191919; display:flex; gap:7px; flex-wrap:wrap; }

  .ph { padding:26px 14px; display:flex; flex-direction:column; align-items:center; gap:9px; color:#555; font-size:12px; }
  .spin { width:20px;height:20px; border:2px solid #222; border-top-color:var(--gold); border-radius:50%; animation:spin .75s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .err-ph { padding:20px 14px; display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center; }

  /* ── TWEET RENDER — pure HTML, no iframe, capturable ── */
  .tw { background:var(--tw-bg); border:1px solid var(--tw-border); border-radius:12px; padding:16px; font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; width:100%; }
  .tw-head { display:flex; align-items:flex-start; gap:10px; margin-bottom:11px; }
  .tw-av { width:40px;height:40px; border-radius:50%; background:#273340; flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .tw-av img { width:100%;height:100%;object-fit:cover; display:block; }
  .tw-names { flex:1; min-width:0; }
  .tw-name { font-size:15px; font-weight:700; color:var(--tw-text); display:flex; align-items:center; gap:4px; }
  .tw-ck { color:var(--tw-blue); font-size:16px; flex-shrink:0; }
  .tw-handle { font-size:13px; color:var(--tw-muted); margin-top:1px; }
  .tw-logo { font-weight:900; font-size:20px; color:var(--tw-text); margin-left:auto; flex-shrink:0; }
  .tw-body { font-size:15px; line-height:1.55; color:var(--tw-text); margin-bottom:10px; white-space:pre-wrap; word-break:break-word; }
  .tw-body .bl { color:var(--tw-blue); }
  .tw-date { font-size:13px; color:var(--tw-muted); padding-top:10px; border-top:1px solid var(--tw-border); margin-bottom:8px; }
  .tw-stats { display:flex; gap:18px; padding-top:8px; border-top:1px solid var(--tw-border); }
  .tw-stat { display:flex; align-items:center; gap:5px; font-size:13px; color:var(--tw-muted); cursor:pointer; }
  .tw-stat:hover { color:var(--tw-blue); }

  /* ── FLOATING BAR ── */
  .dlbar { position:fixed; bottom:22px; right:22px; background:var(--d2); border:1px solid #2e2e2e; border-radius:12px; padding:12px 18px; display:none; align-items:center; gap:12px; box-shadow:0 8px 30px rgba(0,0,0,.65); z-index:100; font-size:13px; }
  .dlbar.show { display:flex; }
  .dlbar-t { color:var(--grey); }
  .dlbar-t strong { color:var(--white); }

  /* ── OFF-SCREEN CAPTURE STAGE ── */
  #stage { position:fixed; left:-9999px; top:0; width:520px; padding:20px; background:var(--tw-bg); z-index:-1; pointer-events:none; }
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">RM</div>
  <div>
    <div class="hdr-t">Tweet Screenshot Tool</div>
    <div class="hdr-s">@RMadrid_actu — Export TikTok Carousel</div>
  </div>
</div>

<div class="main">
  <div class="info">
    📱 <strong>Mode d'emploi :</strong> Colle tes liens → <strong>Charger</strong> → attends l'aperçu → <strong>📸 Screenshot</strong> → <strong>⬇️ Tout télécharger</strong>.
  </div>

  <div class="paste-box">
    <div class="lbl">🔗 Liens de tweets</div>
    <textarea id="urls" placeholder="Un lien par ligne :
https://x.com/RMadrid_actu/status/2051726338097037731
https://x.com/RMadrid_actu/status/9876543210"></textarea>
    <div class="hint">✓ x.com et twitter.com · Les ?s=20 sont nettoyés automatiquement</div>
  </div>

  <div class="row">
    <button class="bp" onclick="loadAll()">🚀 Charger les tweets</button>
    <button class="bs" onclick="clearAll()">🗑 Effacer</button>
  </div>

  <div id="sec" style="display:none">
    <div class="sec-hdr">
      <span class="sec-t">Aperçus</span>
      <span class="bdg" id="cnt"></span>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<div id="stage"></div>

<div class="dlbar" id="dlbar">
  <div class="dlbar-t"><strong id="rdyc">0</strong> screenshot(s) prêt(s)</div>
  <button class="bp" onclick="dlAll()">⬇️ Tout télécharger</button>
</div>

<script>
const shots = {};

function parseUrls(raw) {
  return raw.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
    const clean = line.split('?')[0].split('#')[0];
    const m = clean.match(/(?:twitter\.com|x\.com)\/([^\/]+)\/status\/(\d+)/);
    if (!m) return null;
    return { id: m[2], handle: m[1] };
  }).filter(Boolean);
}

function loadAll() {
  const tweets = parseUrls(document.getElementById('urls').value);
  if (!tweets.length) { alert('Aucun lien valide trouvé.'); return; }
  document.getElementById('grid').innerHTML = '';
  document.getElementById('sec').style.display = 'block';
  document.getElementById('cnt').textContent = tweets.length + ' tweet' + (tweets.length > 1 ? 's' : '');
  Object.keys(shots).forEach(k => delete shots[k]);
  updateBar();
  tweets.forEach(t => { makeCard(t); fetchTweet(t); });
}

function makeCard({ id, handle }) {
  const grid = document.getElementById('grid');
  const d = document.createElement('div');
  d.className = 'card'; d.id = 'c-' + id;
  d.innerHTML = `
    <div class="card-top">
      <div class="pill"><div class="dot d-load" id="dot-${id}"></div>
      <span id="st-${id}" style="color:var(--grey)">Chargement...</span></div>
    </div>
    <div class="card-url">${handle}/status/${id}</div>
    <div class="card-body" id="cb-${id}"><div class="ph"><div class="spin"></div><span>Récupération...</span></div></div>
    <div class="card-actions">
      <button class="bs" id="ssb-${id}" onclick="capture('${id}')" disabled>📸 Screenshot</button>
      <button class="bs" id="dlb-${id}" onclick="dlOne('${id}')" disabled style="display:none">⬇️ PNG</button>
    </div>`;
  grid.appendChild(d);
}

async function fetchTweet({ id, handle }) {
  try {
    // Call our own Vercel serverless function — no CORS
    const res = await fetch(`/api/oembed?id=${id}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.html) throw new Error('no html');

    // Parse oEmbed HTML for text content
    const parser = new DOMParser();
    const doc = parser.parseFromString(data.html, 'text/html');
    const bq = doc.querySelector('blockquote');
    if (!bq) throw new Error('no blockquote');

    const ps = bq.querySelectorAll('p');
    let text = '';
    if (ps.length) {
      // Get inner text, preserve line breaks
      text = ps[0].innerHTML
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/<a[^>]+>([^<]*)<\/a>/gi, '$1')
        .replace(/<[^>]+>/g, '')
        .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
    }

    // Date from last status link
    let dateStr = '';
    bq.querySelectorAll('a').forEach(a => { if (a.href?.includes('/status/')) dateStr = a.textContent; });

    const authorHandle = (data.author_url || '').split('/').pop() || handle;
    const authorName = data.author_name || authorHandle;

    const parsed = { id, handle: authorHandle, name: authorName, text, dateStr };
    renderPreview(id, parsed);
    setStatus(id, 'ok', '✓ Prêt');
    document.getElementById('ssb-' + id).disabled = false;

  } catch(e) {
    console.error(id, e);
    document.getElementById('cb-' + id).innerHTML = `<div class="err-ph"><span style="font-size:22px;color:var(--red)">⚠️</span><span style="color:var(--red);font-size:13px">Erreur : ${e.message}</span></div>`;
    setStatus(id, 'err', 'Erreur');
  }
}

function renderPreview(id, d) {
  document.getElementById('cb-' + id).innerHTML = buildTweet(d);
}

function buildTweet(d) {
  const av = `https://unavatar.io/twitter/${d.handle}`;
  const body = linkify(d.text);
  return `<div class="tw" id="tw-${d.id}">
    <div class="tw-head">
      <div class="tw-av"><img src="${av}" crossorigin="anonymous" onerror="this.parentElement.textContent='👤'"></div>
      <div class="tw-names">
        <div class="tw-name">${esc(d.name)}<span class="tw-ck">✓</span></div>
        <div class="tw-handle">@${esc(d.handle)}</div>
      </div>
      <div class="tw-logo">𝕏</div>
    </div>
    <div class="tw-body">${body}</div>
    ${d.dateStr ? `<div class="tw-date">${esc(d.dateStr)}</div>` : ''}
    <div class="tw-stats">
      <span class="tw-stat">💬 Répondre</span>
      <span class="tw-stat">🔁 Retweet</span>
      <span class="tw-stat">🤍 J'aime</span>
    </div>
  </div>`;
}

function linkify(t) {
  return esc(t)
    .replace(/(#\w+)/g, '<span class="bl">$1</span>')
    .replace(/(@\w+)/g, '<span class="bl">$1</span>')
    .replace(/(https?:\/\/[^\s<]+)/g, '<span class="bl">$1</span>');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setStatus(id, type, text) {
  const dot = document.getElementById('dot-'+id);
  const st  = document.getElementById('st-'+id);
  if (dot) dot.className = 'dot '+(type==='ok'?'d-ok':type==='err'?'d-err':'d-load');
  if (st)  { st.textContent=text; st.style.color=type==='ok'?'var(--green)':type==='err'?'var(--red)':'var(--grey)'; }
}

// ── CAPTURE — clones pure HTML div (no iframe) ── 
async function capture(id) {
  const btn = document.getElementById('ssb-'+id);
  btn.textContent='⏳...'; btn.disabled=true;
  try {
    const src = document.getElementById('tw-'+id);
    if (!src) throw new Error('element not found');

    const stage = document.getElementById('stage');
    stage.innerHTML='';
    const clone = src.cloneNode(true);
    clone.style.width='480px';
    stage.appendChild(clone);

    // Wait for avatar image to load in clone
    await new Promise(r => {
      const img = clone.querySelector('img');
      if (!img || img.complete) { r(); return; }
      img.onload = r; img.onerror = r;
      setTimeout(r, 2500);
    });
    await new Promise(r => setTimeout(r, 150));

    const canvas = await html2canvas(stage, {
      backgroundColor:'#15202b',
      scale: 3,
      useCORS: true,
      allowTaint: false,
      logging: false,
      width: stage.offsetWidth,
      height: stage.scrollHeight,
    });

    stage.innerHTML='';
    shots[id] = canvas.toDataURL('image/png');
    btn.textContent='✅ Capturé';
    const dlb = document.getElementById('dlb-'+id);
    dlb.style.display='inline-flex'; dlb.disabled=false;
    updateBar();
  } catch(e) {
    console.error(e);
    btn.textContent='❌ Erreur'; btn.disabled=false;
  }
}

function dlOne(id) {
  if (!shots[id]) return;
  const a = document.createElement('a');
  a.href=shots[id]; a.download=`tweet_${id}.png`; a.click();
}
function dlAll() { Object.keys(shots).forEach((id,i)=>setTimeout(()=>dlOne(id),i*350)); }

function updateBar() {
  const n = Object.keys(shots).length;
  document.getElementById('rdyc').textContent=n;
  document.getElementById('dlbar').classList.toggle('show',n>0);
}

function clearAll() {
  document.getElementById('urls').value='';
  document.getElementById('grid').innerHTML='';
  document.getElementById('sec').style.display='none';
  Object.keys(shots).forEach(k=>delete shots[k]);
  updateBar();
}
</script>
</body>
</html>
